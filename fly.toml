# fly.toml app configuration file generated for advanced-qa-generator on 2025-12-02T13:53:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'advanced-qa-generator'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
